services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.5'
        reservations:
          memory: 512m
    environment:
      # === Required Settings (UPDATE THESE TO YOUR VPS CONFIG)
      MAIN_URL: 'http://localhost:4007'
      FRONTEND_URL: 'http://localhost:4007'
      NEXT_PUBLIC_BACKEND_URL: 'http://localhost:4007/api'
      JWT_SECRET: 'random string - change me!'
      DATABASE_URL: 'postgresql://user:password@EXTERNAL_HOST:5432/postiz'
      REDIS_URL: 'redis://EXTERNAL_HOST:6379'
      BACKEND_INTERNAL_URL: 'http://localhost:3000'
      TEMPORAL_ADDRESS: "temporal:7233"
      IS_GENERAL: 'true'
      DISABLE_REGISTRATION: 'false'
      STORAGE_PROVIDER: 'local'
      UPLOAD_DIRECTORY: '/uploads'
      NEXT_PUBLIC_UPLOAD_DIRECTORY: '/uploads'
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - "4007:5000"
    networks:
      - postiz-network

  # -----------------------
  # Temporal Stack
  # -----------------------
  temporal:
    container_name: temporal
    ports:
      - '7233:7233'
    image: temporalio/auto-setup:1.28.1
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    environment:
      # These must point to your external PostgreSQL on the VPS
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=user
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=EXTERNAL_HOST
      - DBNAME=temporal
      - VISIBILITY_DBNAME=temporal_visibility
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=false
      - TEMPORAL_NAMESPACE=default
    networks:
      - postiz-network
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    labels:
      kompose.volume.type: configMap

volumes:
  postiz-config:
    external: false
  postiz-uploads:
    external: false

networks:
  postiz-network:
    driver: bridge
    name: postiz-network

