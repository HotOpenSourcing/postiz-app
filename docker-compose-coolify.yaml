# docker-compose-coolify.yaml
# Production compose for Coolify deployment.
# PostgreSQL and Redis are managed externally by Coolify.
# Performance optimized: Elasticsearch removed (~1GB RAM saved).

services:
  postiz:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.5'
        reservations:
          memory: 512m
    environment:
      # === Required Settings (Set these in Coolify UI)
      MAIN_URL: '${MAIN_URL}'
      FRONTEND_URL: '${FRONTEND_URL}'
      NEXT_PUBLIC_BACKEND_URL: '${NEXT_PUBLIC_BACKEND_URL}'
      JWT_SECRET: '${JWT_SECRET}'
      DATABASE_URL: '${DATABASE_URL}'
      REDIS_URL: '${REDIS_URL}'
      BACKEND_INTERNAL_URL: '${BACKEND_INTERNAL_URL:-http://localhost:3000}'
      TEMPORAL_ADDRESS: "temporal:7233"
      IS_GENERAL: 'true'
      DISABLE_REGISTRATION: '${DISABLE_REGISTRATION:-false}'
      STORAGE_PROVIDER: '${STORAGE_PROVIDER:-local}'
      UPLOAD_DIRECTORY: '/uploads'
      NEXT_PUBLIC_UPLOAD_DIRECTORY: '/uploads'
      # Memory Tuning
      NODE_OPTIONS: '--max-old-space-size=512'
    command: sh -c "until pnpm run prisma-db-push; do echo 'Waiting for database...'; sleep 2; done && nginx && pnpm run pm2"

    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - "${PORT:-4007}:5000"
    networks:
      - postiz-network
    depends_on:
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  # -----------------------
  # Temporal Stack
  # Elasticsearch removed — Temporal uses SQL-based visibility (PostgreSQL)
  # which is sufficient for VPS deployments managed by Coolify.
  # -----------------------
  temporal:
    restart: always
    image: temporalio/auto-setup:1.28.1
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m
    environment:
      # Coolify typically injects PGHOST/PGUSER/PGPASSWORD from linked DBs.
      # Fallback to specific TEMPORAL_PG_* variables if using a separate DB.
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=${TEMPORAL_PG_HOST:-${PGHOST:-postgres}}
      - POSTGRES_USER=${TEMPORAL_PG_USER:-${PGUSER:-postgres}}
      - POSTGRES_PWD=${TEMPORAL_PG_PWD:-${PGPASSWORD:-}}
      - DBNAME=${TEMPORAL_DB:-temporal}
      - VISIBILITY_DBNAME=${TEMPORAL_VISIBILITY_DB:-temporal_visibility}
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=false
      - SKIP_DB_CREATE=false
      - SKIP_DEFAULT_NAMESPACE_CREATION=false
      - LOG_LEVEL=debug
      - POSTGRES_DB=${TEMPORAL_DB:-temporal}
    networks:
      - postiz-network
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 7233 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 200s

  # temporal-ui (Optional)
  # Remove or disable if RAM is extremely tight.
  temporal-ui:
    restart: always
    image: temporalio/ui:2.34.0
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=*
    networks:
      - postiz-network
    depends_on:
      temporal:
        condition: service_healthy

volumes:
  postiz-config:
  postiz-uploads:

networks:
  postiz-network:
    driver: bridge
    name: postiz-network

